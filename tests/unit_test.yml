unit_tests:
  - name: test_customers_aggregates_orders_for_existing_customer
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "Alice", last_name: "Smith"}
      - input: ref('stg_orders')
        rows:
          - {order_id: 101, customer_id: 1, order_date: "2024-01-15"}
          - {order_id: 102, customer_id: 1, order_date: "2024-03-20"}
    expect:
      rows:
        - customer_id: 1
          first_name: "Alice"
          last_name: "Smith"
          first_order_date: "2024-01-15"
          most_recent_order_date: "2024-03-20"
          number_of_orders: 2

  - name: test_customers_defaults_to_zero_orders_when_no_orders_exist
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 2, first_name: "Bob", last_name: "Jones"}
      - input: ref('stg_orders')
        rows: []
    expect:
      rows:
        - customer_id: 2
          first_name: "Bob"
          last_name: "Jones"
          first_order_date: null
          most_recent_order_date: null
          number_of_orders: 0