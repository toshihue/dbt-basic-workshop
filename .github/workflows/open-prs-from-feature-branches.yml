name: Open PRs from feature branches

# Lists remote branches matching feature/* and opens a PR into the default branch when:
#   - the branch has commits not on the default branch, and
#   - there is no open PR with the same head → base.
#
# If `gh pr create` fails with:
#   GitHub Actions is not permitted to create or approve pull requests
# enable repo Settings → Actions → General → Workflow permissions →
# "Allow GitHub Actions to create and approve pull requests"
# (organization policy may require an org admin to allow this).
#
# This workflow uses GITHUB_TOKEN only. To use a PAT instead, set env GH_TOKEN from
# a repository secret (e.g. secrets.MY_PAT) and grant that token repo/PR access.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create missing PRs (feature/* → default branch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DEFAULT_BRANCH=$(gh repo view "${GITHUB_REPOSITORY}" --json defaultBranchRef --jq '.defaultBranchRef.name')
          echo "Default branch: ${DEFAULT_BRANCH}"

          git fetch origin --prune

          mapfile -t branches < <(git branch -r | sed -n 's|^[[:space:]]*origin/\(feature/.*\)|\1|p' | sort -u)

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No remote branches matching feature/*"
            exit 0
          fi

          for branch in "${branches[@]}"; do
            [ -n "$branch" ] || continue
            ref="origin/${branch}"

            # Skip if there are no commits on this branch that are not on the default branch (avoids empty PRs)
            ahead=$(git rev-list --count "origin/${DEFAULT_BRANCH}..$ref" 2>/dev/null || echo 0)
            if [ "$ahead" -eq 0 ]; then
              echo "Skip $branch: no commits ahead of ${DEFAULT_BRANCH}"
              continue
            fi

            existing=$(gh pr list --repo "${GITHUB_REPOSITORY}" --base "$DEFAULT_BRANCH" --head "$branch" --state open --json number --jq 'length')
            if [ "$existing" != "0" ]; then
              echo "PR already open for $branch"
              continue
            fi

            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base "$DEFAULT_BRANCH" \
              --head "$branch" \
              --title "Merge ${branch}" \
              --body "Automatically opened for \`${branch}\` → \`${DEFAULT_BRANCH}\`."
            echo "Opened PR for $branch"
          done
