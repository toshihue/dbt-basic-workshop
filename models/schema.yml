version: 2

models:
  - name: customers
    description: １レコードが１名の顧客を示す
    columns:
      - name: customer_id
        description: 顧客IDを示す主キー
        data_tests:
          - unique
          - not_null
      - name: first_order_date
        description: NULL when a customer has not yet placed an order.

  - name: stg_customers
    description: This model cleans up customer data
    columns:
      - name: customer_id
        description: Primary key
        data_tests:
          - unique
          - not_null